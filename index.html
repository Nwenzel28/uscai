<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineering AI Chatbot – USC Discover Engineering</title>

    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
        // ─────────────────────────────────────────────────────────────────
        // USC Brand Colors — change hex values here to re-theme the app.
        // Source: https://identity.usc.edu/visual-identity/color/
        //
        // USC Cardinal  PMS 201 C  C7 M100 Y65 K32  R153 G0 B0
        //   IMPORTANT: tints of cardinal are NOT permitted per brand guide.
        //   Only approved shades (+K) are listed below.
        //
        // USC Gold  PMS 123 C  C0 M27 Y100 K0  R255 G204 B0
        //   Tints at 75%, 50%, and 25% are permitted.
        //   Shades of gold are NOT permitted per brand guide.
        //
        // Secondary: black (#000000), white (#ffffff),
        //   gray-30k (#cccccc, on black), gray-70k (#767676, on white).
        //
        // Tertiary colors are for graphic accents only — not substitutes
        // for cardinal or gold in primary UI elements.
        // ─────────────────────────────────────────────────────────────────
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        // Primary
                        cardinal: {
                            DEFAULT: '#990000', // PMS 201 C — base cardinal
                            '10k':   '#8A0000', // +10K shade (approved)
                            '20k':   '#7A0000', // +20K shade (approved)
                            '30k':   '#6B0000', // +30K shade (approved)
                        },
                        gold: '#FFCC00',         // PMS 123 C — USC Gold

                        // Secondary
                        'usc-gray-30': '#CCCCCC', // 30K — ADA tint on black
                        'usc-gray-70': '#767676', // 70K — ADA tint on white

                        // Tertiary (graphic / accent use only)
                        'usc-salmon': '#F2C6A7', // PMS 474 C
                        'usc-rose':   '#F26178', // PMS 709 C
                        'usc-blue':   '#2B5597', // PMS 7685 C
                        'usc-olive':  '#908C13', // PMS 582 C
                        'usc-yellow': '#FDE021', // PMS 107 C
                        'usc-lime':   '#DAE343', // PMS 380 C
                        'usc-orange': '#FF9015', // PMS 1495 C
                        'usc-red':    '#E43D30', // PMS 179 C
                    }
                }
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension/lib/index.umd.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .sr-only {
            position: absolute; width: 1px; height: 1px;
            padding: 0; margin: -1px; overflow: hidden;
            clip: rect(0,0,0,0); white-space: nowrap; border-width: 0;
        }
        #chatHistory {
            scrollbar-gutter: stable;
        }
        .message-enter {
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 180ms ease-out, transform 180ms ease-out;
        }
        .message-enter-user {
            transform: translate(12px, 10px);
        }
        .message-enter-bot {
            transform: translate(-12px, 10px);
        }
        .message-enter-active {
            opacity: 1;
            transform: translate(0, 0);
        }
        .pop-enter {
            opacity: 0;
            transform: scale(0.96) translateY(4px);
            transition: opacity 120ms ease-out, transform 120ms ease-out;
        }
        .pop-enter-active {
            opacity: 1;
            transform: scale(1) translateY(0);
        }
        .key-symbol-active {
            transform: scale(1.12);
        }

        /* Streaming cursor: blinking bar appended to the end of an in-progress bot reply */
        .stream-cursor {
            display: inline-block;
            width: 2px;
            height: 0.9em;
            background: #990000;
            margin-left: 1px;
            vertical-align: text-bottom;
            animation: stream-blink 0.9s step-end infinite;
        }
        @keyframes stream-blink {
            50% { opacity: 0; }
        }

        /* Copy / regenerate action row: hidden until the bubble (or its row) is hovered or focused */
        .msg-actions {
            opacity: 0;
            transition: opacity 120ms ease-out;
        }
        .msg-row:hover .msg-actions,
        .msg-row:focus-within .msg-actions,
        .msg-actions:focus-within {
            opacity: 1;
        }
        .msg-action-btn {
            transition: background-color 100ms ease-out, color 100ms ease-out;
        }

        .msg-timestamp {
            font-variant-numeric: tabular-nums;
        }

        /* Scroll-to-latest button */
        #scrollToBottomBtn {
            opacity: 0;
            pointer-events: none;
            transform: translate(-50%, 6px);
            transition: opacity 150ms ease-out, transform 150ms ease-out;
        }
        #scrollToBottomBtn.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, 0);
        }

        /* Print / Save chat: hidden on screen, becomes the entire page when printing */
        .print-only { display: none; }
        @media print {
            body * { visibility: hidden; }
            #printTranscript, #printTranscript * { visibility: visible; }
            #printTranscript {
                display: block;
                position: absolute;
                top: 0; left: 0;
                width: 100%;
                padding: 0.5in;
            }
            .print-doc-header {
                border-bottom: 2px solid #990000;
                padding-bottom: 10px;
                margin-bottom: 22px;
            }
            .print-doc-title { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 18px; color: #990000; }
            .print-doc-subtitle { font-size: 13px; color: #292524; margin-top: 2px; }
            .print-doc-meta { font-size: 11px; color: #767676; margin-top: 2px; }
            .print-turn { margin-bottom: 16px; page-break-inside: avoid; }
            .print-role { font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
            .print-role-user { color: #292524; }
            .print-role-bot { color: #990000; }
            .print-body { font-size: 13px; line-height: 1.55; color: #1c1917; }
            .print-body p { margin: 0 0 8px; }
            .print-body ul, .print-body ol { margin: 0 0 8px 1.2em; }
        }
    </style>
</head>
<body class="bg-stone-50 h-screen flex flex-col overflow-hidden">

    <!-- Header: thin, brand present but not heavy -->
    <header class="relative bg-cardinal text-white py-3 px-6 flex items-center justify-between shrink-0 z-30">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-graduation-cap text-xl text-gold" aria-hidden="true"></i>
            <div class="flex items-baseline gap-2">
                <span class="font-bold text-sm">USC Viterbi</span>
                <span class="text-xs text-gold/90 font-semibold tracking-wider hidden sm:inline">DISCOVER ENGINEERING</span>
            </div>
        </div>
        <div class="flex items-center gap-1">
            <button
                id="saveChatBtn"
                onclick="saveChat()"
                aria-label="Save chat as PDF"
                title="Save chat as PDF"
                disabled
                class="opacity-30 cursor-not-allowed w-8 h-8 rounded-full hover:bg-white/10 flex items-center justify-center transition"
            >
                <i class="fa-solid fa-file-arrow-down text-sm text-gold/90"></i>
            </button>
            <button
                id="clearChatBtn"
                onclick="clearChat()"
                aria-label="Clear chat"
                title="Clear chat"
                disabled
                class="opacity-30 cursor-not-allowed w-8 h-8 rounded-full hover:bg-white/10 flex items-center justify-center transition"
            >
                <i class="fa-solid fa-broom text-sm text-gold/90"></i>
            </button>
            <button
                id="settingsBtn"
                onclick="toggleKeyPopup()"
                aria-label="API key settings"
                aria-haspopup="true"
                aria-expanded="false"
                class="w-8 h-8 rounded-full hover:bg-white/10 flex items-center justify-center transition"
            >
                <i id="settingsIcon" class="fa-solid fa-key text-sm text-gold/90"></i>
            </button>
        </div>

        <!-- Floating key popup: press-to-paste, no visible text field -->
        <div
            id="keyPopup"
            class="hidden pop-enter absolute top-full right-4 mt-2 w-52 bg-white text-stone-800 border border-stone-200 rounded-2xl shadow-xl py-4 px-4 z-40"
            role="dialog"
            aria-label="API key entry"
        >
            <p class="text-center text-[10px] font-semibold tracking-wider text-stone-400 uppercase mb-3">Paste API Key</p>

            <div class="relative flex items-center justify-center gap-5 h-12 mb-2">
                <span id="cmdKeySymbol" class="text-3xl font-bold text-stone-300 transition-colors duration-100 select-none">⌘</span>
                <span id="vKeySymbol" class="text-3xl font-bold text-stone-300 transition-colors duration-100 select-none">V</span>

                <!-- Invisible input: focused whenever the popup is open so a paste always lands here -->
                <label for="apiKeyInput" class="sr-only">Gemini API key</label>
                <input
                    type="password"
                    id="apiKeyInput"
                    autocomplete="off"
                    spellcheck="false"
                    class="absolute inset-0 w-full h-full opacity-0 cursor-default"
                />
            </div>
            <p id="keyHint" class="text-center text-[11px] text-stone-400 mb-3">Ctrl + V to paste</p>

            <button
                id="clearKeyBtn"
                onclick="requestClearKey()"
                class="hidden w-full text-center text-[11px] text-stone-400 hover:text-cardinal transition"
            >Clear key</button>
        </div>
    </header>

    <!-- Main: edge-to-edge scroll area, centered message stream -->
    <main class="flex-grow overflow-hidden flex flex-col min-h-0">
        <div class="flex-grow w-full flex flex-col overflow-hidden min-h-0">

            <!-- Scrollbar stays at the screen edge; messages stay centered inside -->
            <div class="relative flex-grow min-h-0">
                <div
                    id="chatHistory"
                    class="h-full overflow-y-auto overflow-x-hidden"
                    aria-live="polite"
                    aria-label="Conversation"
                    onscroll="handleChatScroll()"
                >
                    <div id="chatStream" class="max-w-2xl mx-auto w-full px-4 py-6 space-y-5">
                        <!-- Static welcome message (icon updated on load by JS) -->
                        <div class="flex gap-3">
                            <div class="w-7 h-7 rounded-full bg-gold/30 flex items-center justify-center text-cardinal shrink-0 mt-0.5">
                                <i id="welcomeIcon" class="fa-solid fa-robot text-xs" aria-hidden="true"></i>
                            </div>
                            <div class="bg-white border border-stone-200 text-stone-800 px-4 py-3 rounded-2xl rounded-tl-sm text-sm leading-relaxed max-w-[85%]">
                                Fight On! I'm your engineering advisor. Save your API key above, pick an advisor below, and ask me anything about the field.
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Appears when the user has scrolled up; jumps back to the latest message -->
                <button
                    id="scrollToBottomBtn"
                    onclick="scrollChatToBottom(true)"
                    aria-label="Scroll to latest message"
                    title="Scroll to latest"
                    class="absolute bottom-3 left-1/2 w-8 h-8 rounded-full bg-stone-800 hover:bg-stone-900 text-white shadow-lg flex items-center justify-center transition-colors"
                >
                    <i class="fa-solid fa-arrow-down text-xs" aria-hidden="true"></i>
                </button>
            </div>

            <!-- Credit badge: same pill shape/scale as the advisor picker, docked in the corner above the composer -->
            <div class="px-4 flex justify-end shrink-0">
                <span class="inline-flex items-center gap-1.5 border border-stone-300 rounded-full pl-3 pr-3.5 py-1 text-[11px] font-medium text-stone-500 bg-stone-50">
                    <i class="fa-solid fa-people-group text-cardinal text-xs shrink-0" aria-hidden="true"></i>
                    Made by Team 1
                </span>
            </div>

            <!-- Composer: anchored to the bottom, blends into the page bg -->
            <div class="px-4 pb-4 pt-1 shrink-0">
                <div class="bg-white border border-stone-200 rounded-2xl shadow-sm focus-within:ring-2 focus-within:ring-cardinal transition max-w-2xl mx-auto">
                    <label for="userInput" class="sr-only">Your message</label>
                    <textarea
                        id="userInput"
                        rows="1"
                        placeholder="Ask a question about engineering…"
                        class="w-full resize-none bg-transparent px-4 pt-3 pb-1 text-sm focus:outline-none max-h-[140px] overflow-y-auto"
                        oninput="autoResizeInput()"
                        onkeydown="handleComposerKeydown(event)"
                    ></textarea>

                    <div class="flex items-center justify-between px-2 pb-2 pt-1 gap-2">
                        <!-- Advisor picker -->
                        <div class="relative shrink-0" id="botPickerWrap">
                            <button
                                type="button"
                                id="botPickerBtn"
                                onclick="toggleBotPicker()"
                                aria-haspopup="listbox"
                                aria-expanded="false"
                                class="flex items-center gap-1.5 w-36 sm:w-44 border border-stone-300 rounded-full pl-3 pr-2.5 py-1.5 text-xs sm:text-sm focus:outline-none focus:ring-2 focus:ring-cardinal bg-stone-50 hover:bg-stone-100 cursor-pointer font-medium text-stone-700 transition"
                            >
                                <i id="botSelectorIcon" class="fa-solid fa-robot text-cardinal text-xs shrink-0" aria-hidden="true"></i>
                                <span id="botPickerLabel" class="flex-grow text-left truncate"></span>
                                <i id="botPickerChevron" class="fa-solid fa-chevron-down text-stone-400 text-[10px] shrink-0 transition-transform duration-150" aria-hidden="true"></i>
                            </button>

                            <!-- Opens upward, like a model picker in a real chat app -->
                            <div
                                id="botPickerMenu"
                                role="listbox"
                                aria-label="Choose an advisor"
                                class="hidden pop-enter absolute bottom-full left-0 mb-2 w-64 bg-white border border-stone-200 rounded-2xl shadow-xl py-1.5 z-40 max-h-72 overflow-y-auto"
                            ></div>
                        </div>

                        <!-- Send / Stop: same button, swaps icon + handler while a reply is streaming -->
                        <button
                            id="sendBtn"
                            onclick="handleSendButtonClick()"
                            aria-label="Send message"
                            title="Send message"
                            class="bg-stone-800 hover:bg-stone-900 text-white w-9 h-9 rounded-full text-sm transition duration-150 flex items-center justify-center shrink-0"
                        >
                            <i id="sendBtnIcon" class="fa-solid fa-paper-plane text-xs" aria-hidden="true"></i>
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Integrated confirm modal: replaces native window.confirm() for clear-chat / clear-key -->
    <div
        id="confirmOverlay"
        class="hidden fixed inset-0 bg-stone-900/40 backdrop-blur-[2px] z-50 flex items-center justify-center px-4"
        onclick="if(event.target === this) hideConfirm()"
    >
        <div class="pop-enter bg-white rounded-2xl shadow-2xl max-w-xs w-full p-5" id="confirmCard">
            <p id="confirmMessage" class="text-sm text-stone-700 leading-relaxed mb-4"></p>
            <div class="flex justify-end gap-2">
                <button
                    onclick="hideConfirm()"
                    class="px-3.5 py-1.5 rounded-lg text-sm font-medium text-stone-500 hover:bg-stone-100 transition"
                >Cancel</button>
                <button
                    id="confirmActionBtn"
                    onclick="runConfirmedAction()"
                    class="px-3.5 py-1.5 rounded-lg text-sm font-medium bg-cardinal hover:bg-cardinal-10k text-white transition"
                ></button>
            </div>
        </div>
    </div>

    <!-- Populated by saveChat(); invisible on screen, becomes the whole page when printing -->
    <div id="printTranscript" class="print-only"></div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
